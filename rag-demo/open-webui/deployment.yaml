apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: rag
spec:
  replicas: 1
  selector:
    matchLabels: { app: open-webui }
  template:
    metadata:
      labels: { app: open-webui }
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          env:
            - name: DATABASE_URL
              value: postgresql://openwebui:changeme-lab-only@postgres.rag.svc.cluster.local:5432/openwebui
            - name: VECTOR_DB
              value: pgvector
            - name: PGVECTOR_DB_URL
              value: postgresql://openwebui:changeme-lab-only@postgres.rag.svc.cluster.local:5432/openwebui
            - name: OPENAI_API_BASE_URLS
              value: "http://vllm.rag.svc.cluster.local:8000/v1;http://192.168.2.230:8000/v1"
            - name: OPENAI_API_KEYS
              value: "dummy;dummy"
            - name: WEBUI_SECRET_KEY
              value: lab-secret-change-me
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: open-webui-data }
